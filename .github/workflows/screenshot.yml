name: Steam Homepage Screenshot

on:
  schedule:
    - cron: "0 1,13 * * *"
  workflow_dispatch:
    inputs:
      channel_ids:
        description: "Comma-separated Discord channel IDs (leave empty to use CHANNEL_IDS secret)"
        required: false
        type: string

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - run: node screenshot.js
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_IDS: ${{ inputs.channel_ids || secrets.CHANNEL_IDS }}


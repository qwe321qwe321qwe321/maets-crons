name: Steam Watch

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        required: true
        default: "report"
        type: choice
        options:
          - refresh
          - report

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Determine job
        id: job
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 0 * * *" ]; then
              echo "name=refresh" >> $GITHUB_OUTPUT
            else
              echo "name=report" >> $GITHUB_OUTPUT
            fi
          else
            echo "name=${{ inputs.job }}" >> $GITHUB_OUTPUT
          fi

      - run: node steam-watch.js ${{ steps.job.outputs.name }}
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}

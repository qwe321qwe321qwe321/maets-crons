name: Steam WL Growth Rank Watch

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      channel_id:
        description: "Discord channel ID to report (leave empty for all)"
        required: false
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install --ignore-scripts

      - run: node wl-rank-growth-watch.js
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          FILTER_CHANNEL_ID: ${{ inputs.channel_id }}
